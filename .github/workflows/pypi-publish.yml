on: release
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - uses: actions/checkout@v6
        with:
          fetch-depth: '1'
      - run: uv sync
      - run: uv build
      - run: uv publish
